<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mauritania Explorer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.css" rel="stylesheet"/>
  <style>
    :root{
      --sand:#e8d5a3;--sand-dark:#c9b07a;--sand-light:#f5ead0;
      --terracotta:#c0622a;--terracotta-dark:#8b4115;
      --ink:#1a1208;--stone:#9e8b6e;--stone-dark:#6b5d42;--gold:#e8c87a;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{width:100%;height:100%;overflow:hidden;font-family:'Inter',sans-serif;background:#1a1208;}

    /* Sand particle canvas — fixed behind everything */
    #sandCanvas{position:fixed;inset:0;z-index:2;pointer-events:none;}

    /* Heat shimmer overlay */
    #shimmer{
      position:fixed;inset:0;pointer-events:none;z-index:3;
      background:linear-gradient(180deg,
        rgba(232,200,122,0) 0%,
        rgba(232,200,122,0.04) 40%,
        rgba(232,200,122,0.07) 50%,
        rgba(232,200,122,0.04) 60%,
        rgba(232,200,122,0) 100%);
      animation:shimmer 5s ease-in-out infinite;
    }
    @keyframes shimmer{
      0%,100%{transform:scaleY(1) translateY(0);opacity:0.5;}
      30%{transform:scaleY(1.003) translateY(-1.5px);opacity:0.85;}
      70%{transform:scaleY(0.998) translateY(1px);opacity:0.35;}
    }

    #app{position:relative;z-index:4;width:100%;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

    /* ── Header ── */
    header{flex-shrink:0;text-align:center;padding:10px 16px 5px;position:relative;}
    .logo-svg{display:block;margin:0 auto 2px;}
    header p{font-size:0.7rem;color:#b09060;margin-top:1px;letter-spacing:0.5px;}

    .legend{display:flex;justify-content:center;flex-wrap:wrap;gap:5px;padding:4px 12px;}
    .legend-item{display:flex;align-items:center;gap:5px;font-size:0.7rem;color:#c8a870;cursor:pointer;
      padding:3px 9px;border-radius:99px;background:rgba(0,0,0,0.55);border:1.5px solid rgba(255,255,255,0.1);
      transition:all 0.2s;backdrop-filter:blur(6px);}
    .legend-item:hover,.legend-item.active{border-color:#c0622a;background:rgba(192,98,42,0.35);color:var(--gold);}
    .legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}

    /* ── Map area ── */
    .map-area{flex:1;display:flex;min-height:0;position:relative;}
    #map{width:100%;height:100%;}

    /* MapLibre attribution — styled to blend */
    .maplibregl-ctrl-attrib{
      background:rgba(26,18,8,0.7)!important;
      color:#6b5d42!important;
      font-size:9px!important;
      border-radius:6px 0 0 0!important;
    }
    .maplibregl-ctrl-attrib a{color:#9e8b6e!important;}
    .maplibregl-ctrl-bottom-right{bottom:36px!important;}

    /* ── Markers ── */
    .mb-marker{
      cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;
      animation:markerDrop 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
      position:relative;
    }
    @keyframes markerDrop{
      from{transform:translateY(-20px) scale(0.3);opacity:0;}
      to{transform:translateY(0) scale(1);opacity:1;}
    }
    .mb-icon{
      width:38px;height:38px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:18px;
      border:2px solid rgba(255,255,255,0.25);
      box-shadow:0 3px 14px rgba(0,0,0,0.6);
      transition:transform 0.15s,box-shadow 0.15s;
      background:rgba(26,18,8,0.85);
      backdrop-filter:blur(4px);
    }
    .mb-marker:hover .mb-icon{transform:scale(1.18);box-shadow:0 5px 20px rgba(0,0,0,0.8);}
    .mb-label{
      font-size:9px;font-weight:600;letter-spacing:0.3px;
      color:#e8d5a3;text-shadow:0 1px 4px rgba(0,0,0,0.9),0 0 8px rgba(0,0,0,0.9);
      white-space:nowrap;pointer-events:none;
    }
    /* Category border colors */
    .mb-marker[data-cat="nature"] .mb-icon{border-color:#6a8c4f;}
    .mb-marker[data-cat="historic"] .mb-icon{border-color:#c0622a;}
    .mb-marker[data-cat="transport"] .mb-icon{border-color:#4a9db5;}
    .mb-marker[data-cat="city"] .mb-icon{border-color:#9e8b6e;}

    /* Pulsing ring for Nouakchott (capital) */
    .mb-marker[data-id="nouakchott"] .mb-icon::after{
      content:'';position:absolute;inset:-6px;border-radius:50%;
      border:1.5px solid rgba(158,139,110,0.5);
      animation:ringPulse 2s ease-in-out infinite;
    }
    @keyframes ringPulse{0%,100%{transform:scale(1);opacity:0.6;}50%{transform:scale(1.2);opacity:0.2;}}

    /* Click ripple */
    .mb-marker.clicked .mb-icon::before{
      content:'';position:absolute;inset:-4px;border-radius:50%;
      background:rgba(232,200,122,0.35);
      animation:clickRipple 0.55s ease-out forwards;
    }
    @keyframes clickRipple{from{transform:scale(1);opacity:0.9;}to{transform:scale(3.2);opacity:0;}}

    /* Train line marker */
    .mb-train-dot{
      width:12px;height:12px;border-radius:50%;
      background:#4a9db5;border:2px solid rgba(255,255,255,0.6);
      box-shadow:0 2px 8px rgba(0,0,0,0.5);
      cursor:pointer;
      transition:transform 0.15s;
    }
    .mb-train-dot:hover{transform:scale(1.3);}

    /* Animated train sprite */
    .train-sprite{
      font-size:20px;cursor:pointer;
      filter:drop-shadow(0 2px 6px rgba(0,0,0,0.8));
      transition:transform 0.1s;
      user-select:none;
    }
    .train-sprite:hover{transform:scale(1.3);}

    /* Panel nav */
    .panel-nav{
      display:flex;justify-content:space-between;align-items:center;
      padding:8px 16px 0;margin-bottom:4px;
    }
    .nav-btn{
      background:rgba(255,255,255,0.07);border:1px solid rgba(232,200,122,0.2);
      color:#9a8060;border-radius:99px;padding:3px 12px;font-size:0.72rem;
      cursor:pointer;transition:all 0.2s;
    }
    .nav-btn:hover{background:rgba(192,98,42,0.35);color:var(--gold);border-color:#c0622a;}
    .nav-counter{font-size:0.68rem;color:#6b5d42;}

    /* ── Phone layout ── */
    @media(max-width:640px){
      #app{height:100dvh;}
      header{padding:5px 10px 2px;}
      .logo-svg{height:36px!important;}
      header p{display:none;}
      .legend{gap:3px;padding:2px 8px;}
      .legend-item{font-size:0.58rem;padding:2px 6px;}
      .legend-dot{width:7px;height:7px;}
      .music-bar{padding:3px 10px 6px;gap:6px;}
      .music-btn{font-size:0.7rem;padding:4px 12px;}
      .music-info{font-size:0.62rem;max-width:130px;}
      #ytPlayer{width:1px;height:1px;bottom:0;right:0;}
    }

    /* ── Music bar ── */
    .music-bar{
      flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:10px;
      padding:5px 12px 10px;
    }
    .music-btn{
      background:rgba(192,98,42,0.45);border:1.5px solid rgba(192,98,42,0.8);color:var(--gold);
      border-radius:99px;padding:6px 18px;font-size:0.8rem;font-weight:600;cursor:pointer;
      display:flex;align-items:center;gap:7px;transition:all 0.2s;backdrop-filter:blur(4px);
      white-space:nowrap;box-shadow:0 2px 12px rgba(192,98,42,0.3);
    }
    .music-btn:hover{background:rgba(192,98,42,0.65);transform:scale(1.03);}
    .music-info{
      font-size:0.78rem;color:var(--gold);font-style:italic;
      background:rgba(0,0,0,0.45);padding:4px 12px;border-radius:99px;
      border:1px solid rgba(232,200,122,0.2);backdrop-filter:blur(6px);
      max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .music-pulse{width:8px;height:8px;border-radius:50%;background:#c0622a;flex-shrink:0;animation:mpulse 1.2s ease-in-out infinite;}
    @keyframes mpulse{0%,100%{opacity:0.4;transform:scale(0.8);}50%{opacity:1;transform:scale(1.2);}}

    #ytPlayer{
      position:fixed;bottom:0;right:0;width:1px;height:1px;
      overflow:hidden;opacity:0.01;z-index:1;display:block;
    }
    #ytPlayer iframe{width:1px;height:1px;border:none;display:block;}

    /* iOS tap-to-start overlay */
    #musicOverlay{
      position:fixed;inset:0;z-index:60;
      background:rgba(10,6,2,0.85);
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
      backdrop-filter:blur(8px);cursor:pointer;
    }
    #musicOverlay .overlay-emoji{font-size:3rem;}
    #musicOverlay h2{font-family:'Amiri',serif;color:var(--gold);font-size:1.5rem;text-align:center;}
    #musicOverlay p{color:#9a8060;font-size:0.85rem;text-align:center;max-width:260px;line-height:1.5;}
    #musicOverlay .tap-btn{
      background:rgba(192,98,42,0.5);border:2px solid #c0622a;color:var(--gold);
      border-radius:99px;padding:10px 28px;font-size:1rem;font-weight:600;
      margin-top:8px;animation:pulse-btn 1.8s ease-in-out infinite;
    }
    @keyframes pulse-btn{0%,100%{box-shadow:0 0 0 0 rgba(192,98,42,0.4);}50%{box-shadow:0 0 0 12px rgba(192,98,42,0);}}

    /* ── Info Panel ── */
    .panel-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:40;backdrop-filter:blur(3px);}
    .panel-backdrop.open{display:block;}
    .info-panel{position:fixed;right:-420px;top:0;width:360px;max-width:96vw;height:100vh;
      background:linear-gradient(160deg,#2a1a0a,#1a1005);
      border-left:1px solid rgba(232,200,122,0.2);
      z-index:50;overflow-y:auto;transition:right 0.35s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column;}
    .info-panel.open{right:0;}
    @media(max-width:640px){
      .info-panel{right:auto;left:0;bottom:-100%;top:auto;width:100%;height:82vh;
        border-left:none;border-top:1px solid rgba(232,200,122,0.2);border-radius:20px 20px 0 0;
        transition:bottom 0.35s cubic-bezier(0.4,0,0.2,1);}
      .info-panel.open{bottom:0;}
    }
    .panel-hero-ph{width:100%;height:155px;display:flex;align-items:center;justify-content:center;font-size:4.5rem;}
    .panel-close{position:absolute;top:10px;right:10px;width:30px;height:30px;border-radius:50%;
      background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.15);color:#bbb;font-size:0.85rem;
      cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;}
    .panel-body{padding:16px;flex:1;}
    .panel-cat{display:inline-block;font-size:0.67rem;font-weight:600;text-transform:uppercase;
      letter-spacing:1px;padding:2px 9px;border-radius:99px;margin-bottom:6px;}
    .panel-title{font-family:'Amiri',serif;font-size:1.55rem;color:var(--gold);margin-bottom:3px;}
    .panel-sub{font-size:0.78rem;color:#9a8060;margin-bottom:10px;}
    .panel-desc{font-size:0.83rem;line-height:1.65;color:#c8b090;margin-bottom:14px;}
    .panel-facts{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px;}
    .fact-card{background:rgba(255,255,255,0.05);border:1px solid rgba(232,200,122,0.15);border-radius:8px;padding:8px 10px;}
    .fact-label{font-size:0.63rem;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:#8a7050;margin-bottom:1px;}
    .fact-value{font-size:0.83rem;font-weight:600;color:var(--gold);}
    .panel-links{display:flex;flex-direction:column;gap:7px;}
    .link-btn{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:9px;text-decoration:none;
      font-size:0.8rem;font-weight:500;transition:all 0.2s;border:1.5px solid transparent;}
    .link-btn:hover{transform:translateX(4px);}
    .link-instagram{background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);color:white;}
    .link-youtube{background:#ff0000;color:white;}
    .link-wiki{background:rgba(255,255,255,0.9);color:#1a1208;border-color:rgba(200,160,80,0.4);}
    .link-google{background:#4285f4;color:white;}
    .link-maps{background:#34a853;color:white;}

    /* Terrain mode indicator */
    #terrainBadge{
      position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
      background:rgba(192,98,42,0.7);color:var(--gold);
      padding:4px 12px;border-radius:99px;font-size:0.65rem;font-weight:600;letter-spacing:1px;
      z-index:55;pointer-events:none;opacity:0;
      transition:opacity 0.4s;
    }
    #terrainBadge.show{opacity:1;}
  </style>
</head>
<body>
<a href="https://abbad.app" style="position:fixed;top:10px;left:10px;z-index:100;background:rgba(192,98,42,0.35);border:1px solid rgba(192,98,42,0.5);color:#e8c87a;padding:3px 10px;border-radius:99px;font-size:0.62rem;font-weight:600;text-decoration:none;backdrop-filter:blur(4px);">← home</a>

<!-- Sand particle layer -->
<canvas id="sandCanvas"></canvas>

<!-- Heat shimmer -->
<div id="shimmer"></div>

<div id="app">
  <header>
    <!-- Logo: dune/wave motif — reads as both Saharan dunes and Atlantic waves -->
    <svg class="logo-svg" height="48" viewBox="0 0 240 54" xmlns="http://www.w3.org/2000/svg">
      <path d="M6,40 Q16,22 28,32 Q40,42 52,24 Q60,12 72,28"
            stroke="#c0622a" stroke-width="2.8" fill="none" stroke-linecap="round"/>
      <path d="M6,46 Q18,30 32,38 Q44,46 56,30 Q64,20 78,34"
            stroke="#e8c87a" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.55"/>
      <text x="90" y="26" font-family="Amiri,serif" font-size="20" fill="#e8c87a" font-weight="700">MAURITANIA</text>
      <text x="91" y="41" font-family="Inter,sans-serif" font-size="8.5" fill="#9e8b6e" letter-spacing="3.5">EXPLORER</text>
      <defs>
        <linearGradient id="lgLine" x1="0" x2="1">
          <stop offset="0%" stop-color="#c0622a"/>
          <stop offset="100%" stop-color="#3a8fa8" stop-opacity="0.4"/>
        </linearGradient>
      </defs>
      <line x1="90" y1="46" x2="240" y2="46" stroke="url(#lgLine)" stroke-width="1"/>
    </svg>
    <p>Click on any location to discover it</p>
    <div class="legend">
      <div class="legend-item active" onclick="filterCat(this,'all')"><div class="legend-dot" style="background:#888"></div>All</div>
      <div class="legend-item" onclick="filterCat(this,'nature')"><div class="legend-dot" style="background:#6a8c4f"></div>Nature</div>
      <div class="legend-item" onclick="filterCat(this,'historic')"><div class="legend-dot" style="background:#c0622a"></div>Historic</div>
      <div class="legend-item" onclick="filterCat(this,'transport')"><div class="legend-dot" style="background:#4a9db5"></div>Transport</div>
      <div class="legend-item" onclick="filterCat(this,'city')"><div class="legend-dot" style="background:#9e8b6e"></div>Cities</div>
    </div>
  </header>

  <div class="map-area">
    <div id="map"></div>
  </div>

  <div class="music-bar">
    <div id="musicPulse" class="music-pulse" style="display:none"></div>
    <button class="music-btn" id="musicBtn" onclick="toggleMusic()">🎵 Play Music</button>
    <span class="music-info" id="musicLabel">—</span>
  </div>

  <div id="ytPlayer"></div>
</div>

<!-- iOS tap-to-start overlay -->
<div id="musicOverlay" onclick="handleOverlayTap()">
  <div class="overlay-emoji">🇲🇷</div>
  <h2>Mauritania Explorer</h2>
  <p>Tap to enter and start the music</p>
  <div class="tap-btn">Tap to Begin</div>
</div>

<!-- Backdrop -->
<div class="panel-backdrop" id="backdrop" onclick="closePanel()"></div>

<!-- Info Panel -->
<div class="info-panel" id="infoPanel">
  <div style="position:relative">
    <div id="panelHero" class="panel-hero-ph">🌍</div>
    <button class="panel-close" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-nav">
    <button class="nav-btn" onclick="navPlace(-1)">← Prev</button>
    <span class="nav-counter" id="navCounter"></span>
    <button class="nav-btn" onclick="navPlace(1)">Next →</button>
  </div>
  <div class="panel-body">
    <div class="panel-cat" id="panelCat"></div>
    <div class="panel-title" id="panelTitle"></div>
    <div class="panel-sub" id="panelSub"></div>
    <div class="panel-desc" id="panelDesc"></div>
    <div class="panel-facts" id="panelFacts"></div>
    <div class="panel-links" id="panelLinks"></div>
  </div>
</div>

<div id="terrainBadge">▲ 3D TERRAIN</div>

const CAT = {
  nature:{bg:'rgba(80,130,60,0.2)',text:'#a0e080',border:'#6a8c4f'},

  city:{bg:'rgba(140,120,80,0.2)',text:'#d0b880',border:'#9e8b6e'},
};

// Locations that trigger 3D terrain + camera tilt
const TERRAIN_LOCATIONS = {
  richat: { zoom: 8.5, bearing: 20 },
  atar:   { zoom: 9,   bearing: -10 },
  terjit: { zoom: 10,  bearing: 15 },
  benamera: { zoom: 9, bearing: 30 },
};

// ── Coordinates (lng, lat) ───────────────────────────────────────────────────
const COORDS = {
  richat:     [-11.40, 21.12],
  arguin:     [-16.28, 19.92],
  chinguetti: [-12.37, 20.45],
  oualata:    [-7.03,  17.30],
  atar:       [-13.05, 20.52],
  terjit:     [-13.50, 20.43],
  tichit:     [-9.49,  18.45],
  nouakchott: [-15.98, 18.08],
  benamera:   [-12.31, 23.21],
  nouadhibou: [-17.03, 20.93],
  // train midpoint (Choum) for clickable marker
  train:      [-15.48, 20.52],
};

// Train route line
const TRAIN_LINE = [[-12.47, 22.73], [-15.48, 20.52], [-17.03, 20.93]];

const MARKERS = [];
let terrainEnabled = false;
let map;

// ── MapLibre init ────────────────────────────────────────────────────────────
map = new maplibregl.Map({
  container: 'map',
  style: 'https://tiles.openfreemap.org/styles/dark',
  center: [-11.5, 20.0],
  zoom: 5.1,
  minZoom: 4.0,
  maxZoom: 14,
  attributionControl: true,
  maxBounds: [[-22, 12], [1, 32]],
  pitchWithRotate: true,
});

map.addControl(new maplibregl.NavigationControl({ showCompass: false }), 'bottom-right');

map.on('style.load', () => {
  applyDesertPalette();
  addTrainLayer();
  addOceanShimmer();
  addMarkers();
  startOceanPulse();
});

function applyDesertPalette() {
  const styleData = map.getStyle();
  if (!styleData || !styleData.layers) return;

  const bgLayers = ['background','land','landcover','landuse'];
  const waterLayers = ['water','ocean','water-shadow','waterway'];
  const roadLayers = styleData.layers
    .filter(l => l.id && (l.id.includes('road') || l.id.includes('street') || l.id.includes('highway')))
    .map(l => l.id);

  styleData.layers.forEach(layer => {
    const id = layer.id;
    // Land / background → dark desert brown
    if (id === 'background' || id === 'land' || id === 'landcover') {
      try { map.setPaintProperty(id, 'background-color', '#1e1508'); } catch(e) {}
      try { map.setPaintProperty(id, 'fill-color', '#1e1508'); } catch(e) {}
    }
    // Water → deep ocean dark blue
    if (waterLayers.some(w => id.startsWith(w))) {
      try { map.setPaintProperty(id, 'fill-color', '#0e2030'); } catch(e) {}
      try { map.setPaintProperty(id, 'line-color', '#0e2030'); } catch(e) {}
    }
    // Country borders → terracotta dashed
    if (id.includes('border') || id.includes('boundary')) {
      try {
        map.setPaintProperty(id, 'line-color', '#c0622a');
        map.setPaintProperty(id, 'line-opacity', 0.7);
      } catch(e) {}
    }
    // Place labels → gold/stone tones
    if (id.includes('label') || id.includes('place') || id.includes('city')) {
      try { map.setPaintProperty(id, 'text-color', '#c8a870'); } catch(e) {}
      try { map.setPaintProperty(id, 'text-halo-color', '#1a1208'); } catch(e) {}
    }
  });
}

function addTrainLayer() {
  map.addSource('train-route', {
    type: 'geojson',
    data: {
      type: 'Feature',
      geometry: { type: 'LineString', coordinates: TRAIN_LINE }
    }
  });
  map.addLayer({
    id: 'train-bg',
    type: 'line',
    source: 'train-route',
    layout: { 'line-cap': 'round', 'line-join': 'round' },
    paint: { 'line-color': '#4a9db5', 'line-width': 10, 'line-opacity': 0.18 }
  });
  map.addLayer({
    id: 'train-line',
    type: 'line',
    source: 'train-route',
    layout: { 'line-cap': 'round', 'line-join': 'round' },
    paint: { 'line-color': '#7ec8e3', 'line-width': 2.5, 'line-dasharray': [2, 5], 'line-opacity': 0.8 }
  });

  // Zouerat terminal dot only (Nouadhibou has its own location marker)
  const dotEl = document.createElement('div');
  dotEl.className = 'mb-train-dot';
  dotEl.onclick = () => openPlace('train');
  new maplibregl.Marker({ element: dotEl, anchor: 'center' }).setLngLat([-12.47, 22.73]).addTo(map);
}

function addOceanShimmer() {
  // Subtle shimmer polygon over Atlantic coast area
  map.addSource('ocean-shimmer', {
    type: 'geojson',
    data: {
      type: 'Feature',
      geometry: {
        type: 'Polygon',
        coordinates: [[
          [-22, 14], [-16.0, 14], [-15.5, 16], [-16.5, 18.5],
          [-17.5, 21], [-17.2, 24], [-18, 27], [-22, 27], [-22, 14]
        ]]
      }
    }
  });
  map.addLayer({
    id: 'ocean-shimmer-layer',
    type: 'fill',
    source: 'ocean-shimmer',
    paint: { 'fill-color': '#3a8fa8', 'fill-opacity': 0.05 }
  });
}

let wavePhase = 0;
function startOceanPulse() {
  setInterval(() => {
    wavePhase = (wavePhase + 0.04) % (Math.PI * 2);
    const opacity = 0.04 + Math.sin(wavePhase) * 0.03;
    try { map.setPaintProperty('ocean-shimmer-layer', 'fill-opacity', opacity); } catch(e) {}
  }, 120);
}

function addMarkers() {
  let delay = 0;
  Object.keys(PLACES).forEach(id => {
    const p = PLACES[id];
    const coord = COORDS[id];
    if (!coord) return;

    const el = document.createElement('div');
    el.className = 'mb-marker';
    el.setAttribute('data-cat', p.category);
    el.setAttribute('data-id', id);
    el.style.animationDelay = delay + 'ms';
    delay += 80;

    el.innerHTML = `<div class="mb-icon">${p.emoji}</div><div class="mb-label">${p.name.split(' ').slice(0,2).join(' ')}</div>`;

    el.onclick = () => {
      el.classList.add('clicked');
      setTimeout(() => el.classList.remove('clicked'), 600);
      openPlace(id);
    };

    const marker = new maplibregl.Marker({ element: el, anchor: 'bottom' })
      .setLngLat(coord)
      .addTo(map);

    MARKERS.push({ id, marker, cat: p.category });
  });
}

// ── Animated train sprite ────────────────────────────────────────────────────
(function initTrainSprite() {
  const route = TRAIN_LINE; // [zouerat, choum, nouadhibou]
  function lngLatDist(a, b) {
    const dx = (b[0]-a[0])*Math.cos((a[1]+b[1])*Math.PI/360);
    const dy = b[1]-a[1];
    return Math.sqrt(dx*dx+dy*dy);
  }
  const d01 = lngLatDist(route[0], route[1]);
  const d12 = lngLatDist(route[1], route[2]);
  const total = d01 + d12;

  const el = document.createElement('div');
  el.className = 'train-sprite';
  el.textContent = '🚂';
  el.title = 'Iron Ore Train';
  el.onclick = () => openPlace('train');

  const sprite = new maplibregl.Marker({ element: el, anchor: 'center' })
    .setLngLat(route[0])
    .addTo(map);

  let t = 0;
  const SPEED = 0.00015; // fraction of total route per frame
  let going = 1; // 1 = Zouerat→Nouadhibou, -1 = back
  let phase = 0; // 0..1 along full route

  function tick() {
    phase += SPEED * going;
    if (phase >= 1) { phase = 1; going = -1; el.style.transform = 'scaleX(-1)'; }
    if (phase <= 0) { phase = 0; going = 1; el.style.transform = 'scaleX(1)'; }

    const dist = phase * total;
    let pos;
    if (dist <= d01) {
      const frac = dist / d01;
      pos = [route[0][0]+(route[1][0]-route[0][0])*frac, route[0][1]+(route[1][1]-route[0][1])*frac];
    } else {
      const frac = (dist-d01)/d12;
      pos = [route[1][0]+(route[2][0]-route[1][0])*frac, route[1][1]+(route[2][1]-route[1][1])*frac];
    }
    sprite.setLngLat(pos);
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
})();

// ── Info panel ───────────────────────────────────────────────────────────────
const PLACE_KEYS = Object.keys(PLACES);
let currentPlaceIdx = 0;

function navPlace(dir) {
  currentPlaceIdx = (currentPlaceIdx + dir + PLACE_KEYS.length) % PLACE_KEYS.length;
  openPlace(PLACE_KEYS[currentPlaceIdx]);
}

function openPlace(id) {
  const p = PLACES[id];
  if (!p) return;
  const c = CAT[p.category];
  const idx = PLACE_KEYS.indexOf(id);
  if (idx >= 0) currentPlaceIdx = idx;
  document.getElementById('navCounter').textContent = `${currentPlaceIdx+1} / ${PLACE_KEYS.length}`;

  document.getElementById('panelHero').innerHTML =
    `<div class="panel-hero-ph" style="background:linear-gradient(135deg,rgba(0,0,0,0.4),rgba(0,0,0,0.2)),linear-gradient(135deg,${p.categoryColor}33,${p.categoryColor}55)">${p.emoji}</div>`;

  const badge = document.getElementById('panelCat');
  badge.textContent = p.category.charAt(0).toUpperCase() + p.category.slice(1);
  badge.style.cssText = `background:${c.bg};color:${c.text};border:1.5px solid ${c.border}`;

  document.getElementById('panelTitle').textContent = p.name;
  document.getElementById('panelSub').textContent = p.subtitle;
  document.getElementById('panelDesc').textContent = p.desc;
  document.getElementById('panelFacts').innerHTML = p.facts.map(f =>
    `<div class="fact-card"><div class="fact-label">${f.label}</div><div class="fact-value">${f.value}</div></div>`
  ).join('');
  document.getElementById('panelLinks').innerHTML = p.links.map(l =>
    `<a href="${l.url}" target="_blank" rel="noopener" class="link-btn ${l.style}"><span>${l.icon}</span>${l.label}</a>`
  ).join('');

  document.getElementById('infoPanel').classList.add('open');
  document.getElementById('backdrop').classList.add('open');

  // Fly to location
  const coord = COORDS[id];
  if (coord) {
    const terrainOpts = TERRAIN_LOCATIONS[id];
    if (terrainOpts) {
      enableTerrain();
      map.flyTo({ center: coord, zoom: terrainOpts.zoom, bearing: terrainOpts.bearing, pitch: 45, duration: 1800, essential: true });
    } else {
      if (terrainEnabled) disableTerrain();
      map.flyTo({ center: coord, zoom: id === 'train' ? 6 : 7.5, pitch: 0, bearing: 0, duration: 1400, essential: true });
    }
  }
}

function closePanel() {
  document.getElementById('infoPanel').classList.remove('open');
  document.getElementById('backdrop').classList.remove('open');
  if (terrainEnabled) disableTerrain();
  map.easeTo({ pitch: 0, bearing: 0, zoom: 5.1, center: [-11.5, 20.0], duration: 1200 });
}

function filterCat(el, cat) {
  document.querySelectorAll('.legend-item').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  MARKERS.forEach(({ marker, cat: mCat }) => {
    const show = cat === 'all' || mCat === cat;
    marker.getElement().style.opacity = show ? '1' : '0.1';
    marker.getElement().style.pointerEvents = show ? 'all' : 'none';
  });
  // Also toggle train line layer
  const trainShow = cat === 'all' || cat === 'transport';
  try {
    map.setPaintProperty('train-line', 'line-opacity', trainShow ? 0.8 : 0.05);
    map.setPaintProperty('train-bg', 'line-opacity', trainShow ? 0.18 : 0.02);
  } catch(e) {}
}

// ── 3D Terrain ───────────────────────────────────────────────────────────────
function enableTerrain() {
  if (terrainEnabled) return;
  try {
    if (!map.getSource('terrain-dem')) {
      map.addSource('terrain-dem', {
        type: 'raster-dem',
        tiles: ['https://elevation-tiles-prod.s3.amazonaws.com/terrarium/{z}/{x}/{y}.png'],
        tileSize: 256,
        maxzoom: 14,
        encoding: 'terrarium'
      });
    }
    map.setTerrain({ source: 'terrain-dem', exaggeration: 2.0 });
    terrainEnabled = true;
    const badge = document.getElementById('terrainBadge');
    badge.classList.add('show');
    setTimeout(() => badge.classList.remove('show'), 2000);
  } catch(e) {}
}

function disableTerrain() {
  if (!terrainEnabled) return;
  try {
    map.setTerrain(null);
    terrainEnabled = false;
  } catch(e) {}
}

// ── Sand particle system ─────────────────────────────────────────────────────
const sandCanvas = document.getElementById('sandCanvas');
const ctx = sandCanvas.getContext('2d');
let particles = [];
let sandPaused = false;
let animId;

function resizeSand() {
  sandCanvas.width = window.innerWidth;
  sandCanvas.height = window.innerHeight;
}
resizeSand();
window.addEventListener('resize', resizeSand);

function mkParticle() {
  return {
    x: Math.random() * sandCanvas.width,
    y: Math.random() * sandCanvas.height,
    vx: 0.12 + Math.random() * 0.22,
    vy: 0.04 + Math.random() * 0.14,
    size: 0.8 + Math.random() * 1.6,
    opacity: 0.18 + Math.random() * 0.38,
  };
}

for (let i = 0; i < 45; i++) particles.push(mkParticle());

function drawSand() {
  if (sandPaused) { animId = requestAnimationFrame(drawSand); return; }
  ctx.clearRect(0, 0, sandCanvas.width, sandCanvas.height);
  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(232,200,122,${p.opacity})`;
    ctx.fill();
    p.x += p.vx;
    p.y += p.vy;
    if (p.x > sandCanvas.width + 2) { p.x = -2; p.y = Math.random() * sandCanvas.height; }
    if (p.y > sandCanvas.height + 2) { p.y = -2; p.x = Math.random() * sandCanvas.width; }
  });
  animId = requestAnimationFrame(drawSand);
}
drawSand();

// Pause particles when info panel open (less visual noise)
const panelObserver = new MutationObserver(() => {
  sandPaused = document.getElementById('infoPanel').classList.contains('open');
});
panelObserver.observe(document.getElementById('infoPanel'), { attributes: true, attributeFilter: ['class'] });

  { id: 'y5VoQps0Y3w', title: 'El Belloutou' },
  { id: 'z2Bf5In027A', title: 'Tikifit' },

  ytDiv.innerHTML = `<iframe src="https://www.youtube.com/embed/${YT_ID}?autoplay=1&loop=1&playlist=${YT_ID}&controls=0&rel=0&modestbranding=1${start}" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;

  pulse.style.display = 'block';
}

  overlay.style.display = 'none';
  startMusic();
}

function toggleMusic() {
  if (!musicOn) {
    startMusic();
  } else {
    ytDiv.innerHTML = '';
    musicOn = false;
    btn.innerHTML = '🎵 &nbsp;Play';
    pulse.style.display = 'none';
  }
}
